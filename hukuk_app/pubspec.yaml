name: hukuk_app
description: Legal AI Assistant - Professional chat interface for RAG-powered legal document analysis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # HTTP & SSE
  http: ^1.2.0
  dio: ^5.4.0

  # File picker for document upload
  file_picker: ^8.0.0

  # Markdown rendering for AI responses
  flutter_markdown: ^0.7.0

  # Animations
  flutter_animate: ^4.3.0

  # Google Fonts
  google_fonts: ^6.1.0

  # UUID for session IDs
  uuid: ^4.2.0

  # Path
  path: ^1.9.0

  # Shimmer loading
  shimmer: ^3.0.0
  syncfusion_flutter_pdfviewer: ^33.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
